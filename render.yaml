services:
  - type: web
    name: imperialpaws
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_SITE_URL
        value: https://imperialpaws-pekingese.onrender.com
      - key: SITE_SETTINGS_CACHE_TTL_MS
        value: 60000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: imperialpaws
      - key: MONGODB_TIMEOUT_MS
        value: 2500
      - key: MONGODB_RETRY_COOLDOWN_MS
        value: 30000
      - key: DATA_STORE_LOCAL_READ_FALLBACK
        value: true
      - key: DATA_STORE_LOCAL_FALLBACK
        value: false
      - key: IMAGE_STORAGE_LOCAL_FALLBACK
        value: false
      - key: OWNER_USERNAME
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
